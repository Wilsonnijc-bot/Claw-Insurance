x-backend-common: &backend-common
  image: hendrickyan/claw-insurance:v1.0.1
  pull_policy: always
  volumes:
    - ./config.example.json:/app/config.json
    - ./googleconfig.example.json:/app/googleconfig.json
    - ./supabaseconfig.example.json:/app/supabaseconfig.json
    - ./data:/app/data
    - ./sessions:/app/sessions
    - ./state:/app/state
    - ./memory:/app/memory
    - ./secrets:/app/secrets
    - ./whatsapp-auth:/app/whatsapp-auth
    - ./whatsapp-web:/app/whatsapp-web
    - ./whatsapp-web-debug:/app/whatsapp-web-debug
    - ./skills:/app/skills
    - ./media:/app/media
    - ./cron:/app/cron

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *backend-common
    command: ["gateway", "--api-port", "3456"]
    restart: unless-stopped
    ports:
      - "3456:3456"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  nanobot-frontend:
    container_name: nanobot-frontend
    build:
      context: "./Insurance frontend"
      dockerfile: Dockerfile
    depends_on:
      - nanobot-gateway
    restart: unless-stopped
    ports:
      - "8080:80"

  nanobot-cli:
    <<: *backend-common
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
