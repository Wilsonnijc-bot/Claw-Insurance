x-backend-common: &backend-common
  build:
    context: .
    dockerfile: Dockerfile
  image: claw-insurance-local
  working_dir: /workspace
  environment:
    NANOBOT_PROJECT_ROOT: /workspace
    WEB_BROWSER_MODE: cdp
    WEB_CDP_URL: http://host.docker.internal:9222
  volumes:
    - .:/workspace
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *backend-common
    command: ["launcher", "--api-port", "3456"]
    restart: unless-stopped
    ports:
      - "3456:3456"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  nanobot-frontend:
    container_name: nanobot-frontend
    build:
      context: "./Insurance frontend"
      dockerfile: Dockerfile
    depends_on:
      - nanobot-gateway
    restart: unless-stopped
    ports:
      - "8080:80"

  nanobot-cli:
    <<: *backend-common
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
